<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ Chuva de Corações ✧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Base visual compartilhada: reset, gradiente, estrelas, navegação, corações -->
  <link rel="stylesheet" href="../style.css">
  <!-- Estilos únicos desta página -->
  <link rel="stylesheet" href="coracoes.css">
</head>
<body id="tela">

  <nav class="top-nav">
    <a href="../index.html" class="back-link">← Voltar</a>
    <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
      <button id="rain-btn" class="settings-btn">
        <span>🌧️</span> Iniciar Chuva de Amor
      </button>
      <button id="settings-toggle" class="settings-btn">
        <span>❆</span> Configurações
      </button>
    </div>
  </nav>

  <div id="mensagem-inicial" class="hero-msg">
    <h1>Transforme o clique em Corações</h1>
    <p>Toque na tela para fazer chover corações.</p>
  </div>

  <div id="settings-panel" class="settings-panel glass">
    <h3>Design dos Corações</h3>
    <div class="style-selector">
       <button class="style-btn active" data-heart="random">Aleatório</button>
       <button class="style-btn" data-heart="♡">Contorno (♡)</button>
       <button class="style-btn" data-heart="♥︎">Preenchido (♥︎)</button>
    </div>
  </div>

  <!-- Script global de interação -->
  <script src="../script.js"></script>
  <!-- Script local: painel de estilos e Chuva de Amor -->
  <script src="coracoes.js"></script>
</body>
</html>
