<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ Chuva de Corações ✧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=elite">
</head>
<body id="tela">

  <div class="mesh-container">
    <div class="mesh-gradient"></div>
    <div class="stars-overlay"></div>
  </div>

  <nav class="top-nav">
    <a href="../index.html" class="back-link">← Voltar</a>
    <button id="settings-toggle" class="settings-btn">
      <span>✦</span> Configurações
    </button>
  </nav>

  <div id="mensagem-inicial" class="hero-msg">
    <h1>Transforme o clique em Corações</h1>
    <p>Toque na tela para fazer chover corações.</p>
  </div>

  <div id="settings-panel" class="settings-panel glass">
    <h3>Design dos Corações</h3>
    <div class="style-selector">
       <button class="style-btn active" data-heart="random">Aleatório</button>
       <button class="style-btn" data-heart="♡">Contorno (♡)</button>
       <button class="style-btn" data-heart="♥︎">Preenchido (♥︎)</button>
    </div>
  </div>

  <script src="script.js?v=elite"></script>
</body>
</html>
