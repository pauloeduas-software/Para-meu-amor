<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>✧ Primeiro Encontro ✧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<!-- Base visual compartilhada: reset, gradiente, estrelas, navegação, corações -->
<link rel="stylesheet" href="../style.css">
<!-- Estilos únicos desta página -->
<link rel="stylesheet" href="encontro.css">
</head>
<body id="page-body">

<nav class="top-nav glass">
  <a href="../index.html" class="back-link">
    <span class="back-icon">←</span> Voltar
  </a>
</nav>

<main class="viewport">
  <div class="interaction-zone">
    
    <!-- Texto introditório (visível apenas no carregamento da página) -->
    <div id="intro-layer" class="intro-layer">
      <h1 class="intro-text">Dê um toque na tela para começar...</h1>
    </div>

    <!-- SVG do Coração ao fundo (inicialmente oculto) -->
    <div class="heart-container hidden" id="heart-wrapper">
      <svg id="heart-svg" viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <clipPath id="heart-clip">
            <path d="M50,88.92 L46.5,85.42 C18.5,57.42 0,40.42 0,21.92 C0,6.92 11.5,-4.58 26.5,-4.58 C34.83,-4.58 43.17,-1.08 50,6.75 C56.83,-1.08 65.17,-4.58 73.5,-4.58 C88.5,-4.58 100,6.92 100,21.92 C100,40.42 81.5,57.42 53.5,85.42 L50,88.92 Z" />
          </clipPath>
          <filter id="heartGlow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        
        <!-- Contorno -->
        <path id="heart-outline" d="M50,88.92 L46.5,85.42 C18.5,57.42 0,40.42 0,21.92 C0,6.92 11.5,-4.58 26.5,-4.58 C34.83,-4.58 43.17,-1.08 50,6.75 C56.83,-1.08 65.17,-4.58 73.5,-4.58 C88.5,-4.58 100,6.92 100,21.92 C100,40.42 81.5,57.42 53.5,85.42 L50,88.92 Z" 
              fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
        
        <!-- Preenchimento líquido (retângulo que sobe) -->
        <rect id="heart-liquid" x="0" y="100" width="100" height="110" 
              fill="#ff1e56" clip-path="url(#heart-clip)" filter="url(#heartGlow)" />
      </svg>
    </div>

    <!-- Camada de texto centralizada (inicialmente oculta) -->
    <div class="message-layer hidden" id="message-wrapper">
      <div class="typography-reveal">
        <h1 id="journey-text">...</h1>
        <p id="journey-subtext" style="display:none;"></p>
      </div>
    </div>
    
  </div>

  <div class="prompt-container">
    <p id="click-prompt" class="hidden">Dê mais um toque na tela</p>
  </div>
</main>

<!-- Script global de interação -->
<script src="../script.js"></script>
<!-- Script local: lógica da Jornada -->
<script src="encontro.js"></script>
</body>
</html>
